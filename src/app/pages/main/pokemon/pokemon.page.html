<ion-header>
    <ion-toolbar>
      <ion-title>Lista de Pokémon</ion-title>
    </ion-toolbar>
  </ion-header>
  
  <ion-content>
    <ion-list>
      <ion-item *ngFor="let pokemon of pokemonList">
        <ion-avatar slot="start">
          <img [src]="pokemon.details?.sprites.front_default" alt="{{ pokemon.name }}">
        </ion-avatar>
        <ion-label>
          <h2>{{ pokemon.name | titlecase }}</h2>
          <p *ngIf="pokemon.details">Tipo: {{ pokemon.details.types[0].type.name | titlecase }}</p>
        </ion-label>
      </ion-item>
    </ion-list>
    
    <ion-infinite-scroll (ionInfinite)="loadMore($event)">
      <ion-infinite-scroll-content
        loadingSpinner="bubbles"
        loadingText="Cargando más Pokémon...">
      </ion-infinite-scroll-content>
    </ion-infinite-scroll>
  </ion-content>
